version: "3"

tasks:
  build:
    dir: ../../..
    cmds:
      - go build ./...

  test:
    dir: ../../..
    cmds:
      - go test -count=1 -race ./...

  vet:
    dir: ../../..
    cmds:
      - go vet ./...

  test-unit:
    dir: ../../..
    cmds:
      - go test -count=1 -race ./... -run Unit

  test-integration:
    dir: ../../..
    cmds:
      - |
        if [ "$(go env GOOS)" = "windows" ]; then
          echo "skipping integration tests on windows"
        else
          go test -count=1 -race ./... -run Integration -tags integration
        fi

  default:
    deps:
      - build
      - test
      - vet
